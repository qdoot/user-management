server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: user-management

  # ─────────────────────────────────────────────
  # Datasource PostgreSQL
  # I valori sensibili sono sovrascritti via env
  # nel docker-compose.yml in produzione locale.
  # ─────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:usermanagement}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Pool dimensionato per un singolo microservizio:
      # sufficiente per carichi medi, evita contesa sul DB.
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  # ─────────────────────────────────────────────
  # JPA / Hibernate
  # ─────────────────────────────────────────────
  jpa:
    # none: Flyway gestisce lo schema — Hibernate non deve toccarlo
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        # Mostra SQL in console per debug in sviluppo.
        # In produzione impostare a false o filtrare via log level.
        show_sql: true
        format_sql: true
        # Batch insert/update: migliora le performance su operazioni bulk
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  # ─────────────────────────────────────────────
  # Flyway: migration automatica all'avvio
  # ─────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ─────────────────────────────────────────────
  # RabbitMQ
  # ─────────────────────────────────────────────
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    # Conferma di pubblicazione: garantisce che il messaggio
    # raggiunga l'exchange prima di considerare il publish concluso.
    publisher-confirms: true
    publisher-returns: true

  # ─────────────────────────────────────────────
  # Security: OAuth2 Resource Server (Keycloak)
  # Il servizio valida i JWT senza gestire l'autenticazione.
  # Keycloak è l'authority — la chiave pubblica viene recuperata
  # automaticamente dal jwk-set-uri al boot.
  # ─────────────────────────────────────────────
  security:
    oauth2:
      resourceserver:
        jwt:
          # Endpoint JWKS di Keycloak per la verifica della firma JWT
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/user-management/protocol/openid-connect/certs}
          # Issuer atteso nel claim 'iss' del JWT
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/user-management}

# ─────────────────────────────────────────────
# Springdoc OpenAPI — Swagger UI
# Accessibile su: http://localhost:8080/api/swagger-ui.html
# ─────────────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

# ─────────────────────────────────────────────
# Actuator: espone solo health e info per sicurezza
# ─────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# ─────────────────────────────────────────────
# Logging
# Pattern strutturato: timestamp, livello, thread, classe, messaggio.
# In produzione considerare formato JSON per aggregatori (ELK, Loki).
# ─────────────────────────────────────────────
logging:
  level:
    it.intesigroup.usermanagement: DEBUG
    org.springframework.security: DEBUG        
    org.springframework.security.oauth2: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# ─────────────────────────────────────────────
# Configurazione custom applicativa
# Raccolta in un namespace dedicato per evitare conflitti
# con proprietà Spring e per binding con @ConfigurationProperties.
# ─────────────────────────────────────────────
app:
  rabbitmq:
    exchange: user.events
    routing-key:
      user-created: user.created
  security:
    # Ruoli che possono vedere i campi sensibili (codiceFiscale, keycloakId)
    privileged-roles:
      - OWNER
      - OPERATOR
